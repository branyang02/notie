name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip runs triggered by this workflow's own version bump commits to
    # avoid an infinite re-trigger/auto-republish loop.
    if: "${{ !startsWith(github.event.head_commit.message, 'ci: bump version') }}"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure npm for authentication
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Determine version bump
        id: version_bump
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # BREAKING CHANGE can appear anywhere in the commit message
          # (subject, body, or footer), so check the full message first.
          if [[ "$COMMIT_MSG" =~ BREAKING[[:space:]]CHANGE ]]; then
            echo "bump=major" >> $GITHUB_ENV
          elif [[ "$COMMIT_MSG" =~ ^feat ]]; then
            echo "bump=minor" >> $GITHUB_ENV
          elif [[ "$COMMIT_MSG" =~ ^fix ]]; then
            echo "bump=patch" >> $GITHUB_ENV
          else
            # Default: any other commit type gets a patch bump.
            echo "bump=patch" >> $GITHUB_ENV
          fi

      - name: Bump version
        id: bump_version
        run: |
          npm version ${{ env.bump }} --no-git-tag-version
          npm install --package-lock-only  # Update package-lock.json with the new version
          cd demo-app && npm install --package-lock-only && cd .. # Update package-lock.json in demo-app
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_ENV

      - name: Build the package
        run: npm run build

      # Commit and push the version bump BEFORE publishing, so a failed push
      # cannot leave npm ahead of git. If the push fails, the job fails here
      # and nothing is published.
      - name: Push version bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add package.json package-lock.json demo-app/package-lock.json
          git commit -m "ci: bump version to ${{ env.new_version }}"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
